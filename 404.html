<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面未找到 | 谢施炫</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF9F6;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .wrap { padding: 40px; max-width: 400px; }
    h1 { font-size: 5rem; font-weight: 300; color: #60A5FA; margin-bottom: 16px; }
    p { font-size: 1rem; font-weight: 300; color: #666; margin-bottom: 32px; line-height: 1.7; }
    a {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid #60A5FA;
      color: #60A5FA;
      text-decoration: none;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 300;
      transition: all 0.3s;
    }
    a:hover { background: #60A5FA; color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>抱歉，您访问的页面不存在。<br/>不如回到主页看看？</p>
    <a href="/personal-page/">返回主页</a>
  </div>
</body>
</html>
